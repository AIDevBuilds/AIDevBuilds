name: Update README with Latest YouTube Videos

on:
  schedule:
    - cron: '0 6 * * 3'   # Every Wednesday at 6:00 AM UTC (11:30 AM IST)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_HANDLE: AIDevBuilds
        run: python .github/scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Auto-update: latest YouTube videos [skip ci]"
          git push
